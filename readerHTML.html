<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudyTron</title>
    <link rel="stylesheet" href="readerCSS.css">
    <script src="readerJS.js" defer></script>

</head>
<body>
    <h1 id ="mainTitle">StudyTron READER</h1>
    
    <div id="inputContainer">
      <textarea id="inputText" placeholder="Paste your text here..." rows="15" cols="60"></textarea>
      <br>
      <button id="submitBtn">Submit</button>
      <button id="copyBtn">Copy</button>
      <button id="clearBtn">Clear Text</button>
      <button id="showTextBtn" style="display: none;">Show Text</button>

      <!-- New Hard Container -->
      <div class="hardContainer" style="margin-top:20px;">
          <textarea id="hardText" placeholder="Hard text here..." rows="10" cols="60"></textarea>
          <br>
          <button id="copyHardBtn">Copy</button>
          <button id="clearHardBtn">Clear Text</button>
      </div>

      <!-- New Focus Container -->
      <div class="focusContainer" style="margin-top:20px;">
          <textarea id="focusText" placeholder="Focus text here..." rows="10" cols="60"></textarea>
          <br>
          <button id="copyFocusBtn">Copy</button>
          <button id="clearFocusBtn">Clear Text</button>
      </div>
    </div>

    <!-- New toggle button -->
<button id="showTextareaBtn" style="display:none;">Show Textarea</button>

    <!-- Pagination controls (top) -->
<div class="pagination-container">
  <button id="prevPage">Previous</button>
  <select class="page-select" id="pageDropdownTop"></select>
  <button id="nextPage">Next</button>
  <button id="showAllPage">Show All</button>

</div>

<pre id="outputHtml"></pre>

<!-- Pagination controls (bottom) -->
<div class="pagination-container">
  <button id="prevPageBottom">Previous</button>
  <select class="page-select" id="pageDropdownBottom"></select>
  <button id="nextPageBottom">Next</button>
  <button id="showAllPageBottom">Show All</button>
</div>

    <div id="sideMenu" class="menu">
    <p class="menuText">Navigation</p>
    <button id="backToTop">Up</button>
    <button id="toMiddle">Mid</button>
    <button id="toBottom">Down</button>

    <br /><br />
    <a href="/StudyTron/index.html">Questions</a>
    
  </div>

  <button id="menuButton">☰</button>
  <button id="blepButton">HIDE 1</button>
  <button id="blepButton2">HIDE 2</button>
  <button id="toggleHFBtn">SHOW HF</button>
  <!--<button id="blepButton">SHOW</button>
  <button id="blepButton2">HIDE STATEMENTS</button>-->





  <div class="bottom-spacer"></div>


</body>
</html>
